<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mini Tamagotchi</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Overwritten per Pokemon line by applyTheme() */
    --shell: #7d93a6;
    --shell-dark: #586c7d;
    --btn: #aab6d6;
    --shell-hi: color-mix(in srgb, var(--shell) 78%, white);
    --ink: #2b2a24;
    --lcd-bg: #c3c4b6;
    --lcd-ink: #33322c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: "Pixelify Sans", monospace;
    background: radial-gradient(120% 120% at 50% 0%, #efeadf 0%, #e2dccf 45%, #d6cfc0 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 24px; color: var(--ink);
    -webkit-font-smoothing: none;
  }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 18px; }

  .device {
    position: relative;
    width: 500px; height: 640px;
    border-radius: 46% 46% 44% 44% / 42% 42% 48% 48%;
    background: radial-gradient(120% 90% at 38% 20%, var(--shell-hi) 0%, var(--shell) 46%, var(--shell-dark) 100%);
    box-shadow:
      inset 0 8px 18px rgba(255,255,255,.35),
      inset 0 -24px 40px rgba(0,0,0,.28),
      0 26px 48px rgba(0,0,0,.28);
    padding: 40px 44px 30px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .device::before {
    content: ""; position: absolute; inset: 12px;
    border-radius: inherit; border: 2px solid rgba(255,255,255,.10);
    box-shadow: inset 0 0 0 2px rgba(0,0,0,.06); pointer-events: none;
  }

  .screen-frame {
    position: relative; width: 328px; height: 278px;
    background: linear-gradient(#141410, #2c2b24);
    border-radius: 16px; padding: 14px;
    box-shadow: inset 0 3px 7px rgba(0,0,0,.6), 0 2px 0 rgba(255,255,255,.14);
  }

  .lcd-stack { position: relative; width: 100%; height: 100%; border-radius: 3px; overflow: hidden; }
  .lcd-stack canvas { position: absolute; inset: 0; width: 100%; height: 100%; image-rendering: pixelated; }
  #bg { z-index: 0; background: var(--lcd-bg); cursor: pointer; }
  #pet {
    position: absolute; left: 50%; top: 45%;
    z-index: 1; pointer-events: none; display: none;
    image-rendering: pixelated; transform: translate(-50%, -50%);
  }
  #fx { z-index: 2; pointer-events: none; }

  .screen-frame::after {
    content: ""; position: absolute; inset: 14px; border-radius: 3px; pointer-events: none; z-index: 3;
    background:
      linear-gradient(115deg, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 34%),
      repeating-linear-gradient(rgba(0,0,0,.05) 0 2px, rgba(0,0,0,0) 2px 4px);
  }

  .overlay {
    position: absolute; inset: 0; border-radius: 3px; z-index: 4;
    background: var(--lcd-bg); color: var(--lcd-ink);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 18px; cursor: pointer;
  }
  .overlay.show { display: flex; }
  .overlay .msg { font-size: 22px; line-height: 1.5; }
  .overlay .prompt { margin-top: 18px; font-size: 15px; opacity: .8; animation: blink 1s steps(2, start) infinite; }
  @keyframes blink { 50% { opacity: .15; } }

  .nameplate {
    margin-top: 12px; font-size: 17px; letter-spacing: 1px;
    color: color-mix(in srgb, var(--shell-dark) 55%, black);
    text-shadow: 0 1px 0 rgba(255,255,255,.25);
    text-transform: uppercase; user-select: none;
  }
  .nameplate .stage-tag { opacity: .7; font-size: 13px; }

  .btn-row { margin-top: 18px; display: flex; gap: 34px; }
  .abtn {
    font-family: inherit; font-size: 18px;
    color: color-mix(in srgb, var(--shell-dark) 60%, black);
    width: 60px; height: 60px; border: none; border-radius: 50%;
    background: radial-gradient(120% 120% at 35% 25%, color-mix(in srgb, var(--btn) 82%, white) 0%, var(--btn) 55%, color-mix(in srgb, var(--btn) 70%, black) 100%);
    box-shadow:
      inset 0 2px 3px rgba(255,255,255,.5),
      0 5px 0 color-mix(in srgb, var(--btn) 55%, black),
      0 7px 9px rgba(0,0,0,.25);
    cursor: pointer; transition: transform .05s ease, box-shadow .05s ease;
    display: grid; place-items: center;
  }
  .abtn:active, .abtn.pressed {
    transform: translateY(4px);
    box-shadow: inset 0 2px 5px rgba(0,0,0,.25), 0 1px 0 color-mix(in srgb, var(--btn) 55%, black);
  }
  .abtn:focus-visible { outline: 3px solid #fff; outline-offset: 3px; }
  .abtn .lbl { font-size: 12px; opacity: .85; margin-top: -3px; }

  .hint { font-size: 14px; color: #7c7566; max-width: 420px; text-align: center; line-height: 1.55; user-select: none; }
  .hint b { color: #5c5647; }
</style>
</head>
<body>
  <div class="stage">
    <div class="device" id="device">
      <div class="screen-frame">
        <div class="lcd-stack">
          <canvas id="bg" width="300" height="250" aria-label="Virtual pet screen"></canvas>
          <img id="pet" alt="" />
          <canvas id="fx" width="300" height="250"></canvas>
          <div class="overlay" id="overlay">
            <div class="msg" id="overMsg"></div>
            <div class="prompt">press a button</div>
          </div>
        </div>
      </div>

      <div class="nameplate" id="nameplate">— <span class="stage-tag">egg</span></div>

      <div class="btn-row">
        <button class="abtn" id="btnA" aria-label="Button A: move selection">A<span class="lbl">move</span></button>
        <button class="abtn" id="btnB" aria-label="Button B: select">B<span class="lbl">pick</span></button>
        <button class="abtn" id="btnC" aria-label="Button C: back / cancel">C<span class="lbl">back</span></button>
      </div>
    </div>

    <p class="hint">
      <b>A</b> moves the cursor · <b>B</b> does the action · <b>C</b> cancels.
      Tap the <b>poop</b> to clean it. Keyboard A / B / C also works.
    </p>
  </div>

<script>
"use strict";

/* =====================================================================
   CONFIG
===================================================================== */
const CONFIG = {
  maxStat: 100,
  decayPerSec: { hunger: 100 / 300, energy: 100 / 600, happiness: 100 / 420 },
  poopHappinessDrainPerSec: 0.2,
  feedGain: 26,
  loveGain: 22,
  sleepDurationMs: 10000,
  poopEverySec: 10,
  maxPoops: 5,
  poopRenderPx: 16,           // useless poo.png is 32x32; draw it at 16x16
  evolveReq: {
    base:  { feed: 2, love: 2 },
    final: { feed: 5, love: 4, sleep: 2, clean: 2 }
  },
  evolveFxSec: 1.9
};

/* Each line keeps its own case + button colors */
const LINES = {
  wooper:    { name:"Wooper",    baseName:"Wooper",    finalName:"Quagsire",  base:"wooper",    final:"quagsire",
               theme:{ shell:"#7d93a6", shellDark:"#586c7d", btn:"#aab6d6" } },
  mienfoo:   { name:"Mienfoo",   baseName:"Mienfoo",   finalName:"Mienshao",  base:"mienfoo",   final:"mienshao",
               theme:{ shell:"#a05a5f", shellDark:"#77444a", btn:"#efe3cf" } },
  sandshrew: { name:"Sandshrew", baseName:"Sandshrew", finalName:"Sandslash", base:"sandshrew", final:"sandslash",
               theme:{ shell:"#5b3f2a", shellDark:"#3c2818", btn:"#cba579" } }, // dark brown / light brown
  cherubi:   { name:"Cherubi",   baseName:"Cherubi",   finalName:"Cherrim",   base:"cherubi",
               special:"cherrim", finalSunny:"cherrim-sunny", finalOvercast:"cherrim-overcast",
               theme:{ shell:"#c77f86", shellDark:"#9a5f66", btn:"#8ba06a" } }
};

/* key -> exact filename. Drop all of these next to the .html file. */
const ASSETS = {
  // creatures (120 x 112 each)
  wooper: "wooper.png", quagsire: "quagsire.png",
  mienfoo: "mienfoo.png", mienshao: "mienshao.png",
  sandshrew: "sandshrew.png", sandslash: "sandslash.png",
  cherubi: "cherubi.png",
  "cherrim-sunny": "cherrim-sunny.png",
  "cherrim-overcast": "cherrim-overcast.png",
  // items / icons
  eggAnim:  "egg-animated.png",
  poo:      "useless poo.png",
  heart:    "heart.png",
  star:     "Star.png",
  bowling:  "Bowling ball.png",
  icecream: "icecream.png",
  maki:     "makiroll.png",
  sushi:    "sushi.png",
  pie:      "pie.png"
};

const FOODS = ["maki", "sushi", "pie", "icecream"]; // feed rotation (ice cream stays as the hunger icon only)

const COL = { ink:"#33322c", mid:"#8f8d82", lite:"#e0e0d3", bg:"#c3c4b6" };
const SPR_COLORS = { "#":COL.ink, "+":COL.mid, "o":COL.lite };

/* Pixel fallbacks (shown only if a PNG hasn't loaded, e.g. this preview) */
const SPR = {
  blob: [
    "....########....","..##oooooooo##..",".#oooooooooooo#.","#oooooooooooooo#",
    "#ooo##oooo##ooo#","#ooo##oooo##ooo#","#oooooooooooooo#","#oooooooooooooo#",
    "#oooo######oooo#",".#oooooooooooo#.","..#oooooooooo#..","...##oooooo##...",".....######....."
  ],
  poop: [ "...##...","..#oo#..",".#o++o#.","#o++++o#","########" ],
  iceCream: [ "..####..",".######.",".######.",".######.","..####..","...##...","...##...","....#..." ],
  ball: [ "..####..",".######.","########","########","########","########",".######.","..####.." ],
  heartSmall: [ ".#.#.","#####","#####",".###.","..#.." ],
  star: [ "..#..",".###.","#####",".###.",".#.#." ],
  zGlyph: [ "####.","...#.","..#..",".#...","####." ],
  sparkle: [ ".#.","###",".#." ]
};
const FALLBACK = {
  poo: SPR.poop, heart: SPR.heartSmall, star: SPR.star, bowling: SPR.ball,
  icecream: SPR.iceCream, maki: SPR.iceCream, sushi: SPR.iceCream, pie: SPR.iceCream
};
const sw = (s) => s[0].length;
const sh = (s) => s.length;

/* =====================================================================
   IMAGES
===================================================================== */
const IMAGES = {};
function loadImages() {
  for (const key in ASSETS) {
    const img = new Image();
    img.src = encodeURI(ASSETS[key]);
    IMAGES[key] = img;
  }
}
function imageReady(key) {
  const img = IMAGES[key];
  return img && img.complete && img.naturalWidth > 0;
}

/* =====================================================================
   STATE
===================================================================== */
const state = {};
function randFood() { return FOODS[Math.floor(Math.random() * FOODS.length)]; }

function resetGame() {
  const keys = Object.keys(LINES);
  const line = keys[Math.floor(Math.random() * keys.length)];
  Object.assign(state, {
    line, stage: "egg", finalFile: null, finalName: null,
    hunger: 78, energy: 82, happiness: 74,
    cursor: 0, menu: ["feed", "love", "sleep"],
    sleeping: false, sleepStart: 0, sleepEnd: 0, sleepFromEnergy: 0,
    count: { feed: 0, love: 0, sleep: 0, clean: 0 },
    poops: [], poopTimer: 0, poopId: 0,
    feedIcon: randFood(),
    bornAt: performance.now(), lastInteraction: performance.now(),
    effects: [], hop: 0, blink: 0,
    phase: "play", evolveTimer: 0, flash: 0, sparkleAcc: 0,
    petKey: null, petBlob: true
  });
  applyTheme(line);
  hideOverlay();
  updateNameplate();
}

function applyTheme(line) {
  const t = LINES[line].theme, r = document.documentElement.style;
  r.setProperty("--shell", t.shell);
  r.setProperty("--shell-dark", t.shellDark);
  r.setProperty("--btn", t.btn);
}
function currentName() {
  const L = LINES[state.line];
  if (state.stage === "egg") return "The egg";
  if (state.stage === "final") return state.finalName || L.finalName;
  return L.baseName;
}
function updateNameplate() {
  const L = LINES[state.line]; let name, tag;
  if (state.stage === "egg")       { name = L.name;               tag = "egg"; }
  else if (state.stage === "base") { name = L.baseName;           tag = "stage 1"; }
  else                             { name = state.finalName || L.finalName; tag = "final"; }
  document.getElementById("nameplate").innerHTML =
    `${name.toUpperCase()} <span class="stage-tag">${tag}</span>`;
}

/* =====================================================================
   ACTIONS
===================================================================== */
function noteInteraction() { state.lastInteraction = performance.now(); }

function feed() {
  if (state.sleeping) return;
  state.hunger = Math.min(CONFIG.maxStat, state.hunger + CONFIG.feedGain);
  state.count.feed++;
  state.hop = 1;
  state.effects.push({ type:"food", key: state.feedIcon, x:150, y:44, vy:70, life:1.2, max:1.2 });
  state.feedIcon = randFood();
  noteInteraction();
}
function love() {
  if (state.sleeping) return;
  state.happiness = Math.min(CONFIG.maxStat, state.happiness + CONFIG.loveGain);
  state.count.love++;
  state.hop = 1;
  for (let i = 0; i < 3; i++) {
    state.effects.push({ type:"heart", key:"heart",
      x: 150 - 26 + i * 26 + (Math.random() * 10 - 5),
      y: 108 + Math.random() * 10, vy: 42 + Math.random() * 18, life: 1.3, max: 1.3 });
  }
  noteInteraction();
}
function sleep() {
  if (state.sleeping) return;
  state.sleeping = true;
  state.sleepStart = performance.now();
  state.sleepEnd = state.sleepStart + CONFIG.sleepDurationMs;
  state.sleepFromEnergy = state.energy;
  noteInteraction();
}
function cancelSleep() {
  if (!state.sleeping) return;
  state.sleeping = false; state.count.sleep++; noteInteraction();
}
const ACTIONS = { feed, love, sleep };

function cleanPoopAt(lx, ly) {
  const r = CONFIG.poopRenderPx / 2 + 4; // hit radius with a little margin
  for (let i = state.poops.length - 1; i >= 0; i--) {
    const p = state.poops[i];
    if (Math.abs(lx - p.x) <= r && Math.abs(ly - p.y) <= r) {
      state.poops.splice(i, 1);
      state.count.clean++;
      noteInteraction();
      return;
    }
  }
}

/* =====================================================================
   EVOLUTION
===================================================================== */
function meets(req) { return Object.keys(req).every((k) => state.count[k] >= req[k]); }
function startEvolveFx() { state.evolveTimer = CONFIG.evolveFxSec; state.flash = 1; state.hop = 1; }
function tryEvolve() {
  if (state.stage === "egg" && meets(CONFIG.evolveReq.base)) {
    state.stage = "base"; updateNameplate(); startEvolveFx();
  } else if (state.stage === "base" && meets(CONFIG.evolveReq.final)) {
    const L = LINES[state.line];
    if (L.special === "cherrim") {
      const sunny = state.happiness >= 60 && state.count.love >= 5;
      state.finalFile = sunny ? L.finalSunny : L.finalOvercast;
      state.finalName = sunny ? "Cherrim (Sunny)" : "Cherrim (Overcast)";
    } else {
      state.finalFile = L.final; state.finalName = L.finalName;
    }
    state.stage = "final"; updateNameplate(); startEvolveFx();
  }
}
function petAssetKey() {
  if (state.stage === "egg") return "eggAnim";
  if (state.stage === "base") return LINES[state.line].base;
  return state.finalFile;
}

/* =====================================================================
   END GAME
===================================================================== */
function endGame(kind) {
  if (state.phase !== "play") return;
  state.phase = "over";
  const nm = currentName(); let lines;
  if (kind === "runaway") {
    lines = [`${nm} ran away`, `because you didn't`, `love him enough.`];
  } else {
    const mins = Math.max(1, Math.round((performance.now() - state.bornAt) / 60000));
    lines = [`${nm} lived for`, `${mins} minute${mins === 1 ? "" : "s"}.`, `${nm} was loved by all.`];
  }
  document.getElementById("overMsg").innerHTML = lines.join("<br>");
  document.getElementById("overlay").classList.add("show");
}
function hideOverlay() { document.getElementById("overlay").classList.remove("show"); }

/* =====================================================================
   INPUT
===================================================================== */
function handleButtonPress(which) {
  if (state.phase === "over") { resetGame(); return; }
  if (which === "A") { if (!state.sleeping) { state.cursor = (state.cursor + 1) % state.menu.length; state.blink = 0; } }
  else if (which === "B") { if (!state.sleeping) ACTIONS[state.menu[state.cursor]](); }
  else if (which === "C") { if (state.sleeping) cancelSleep(); }
}
function flashButton(el) { el.classList.add("pressed"); setTimeout(() => el.classList.remove("pressed"), 90); }

function wireInput() {
  document.getElementById("btnA").addEventListener("click", () => handleButtonPress("A"));
  document.getElementById("btnB").addEventListener("click", () => handleButtonPress("B"));
  document.getElementById("btnC").addEventListener("click", () => handleButtonPress("C"));
  window.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (k === "a" || k === "arrowleft")            { handleButtonPress("A"); flashButton(btnA); }
    else if (k === "b" || k === "enter" || k === " ") { handleButtonPress("B"); flashButton(btnB); e.preventDefault(); }
    else if (k === "c" || k === "escape")          { handleButtonPress("C"); flashButton(btnC); }
  });
  const hit = document.getElementById("bg");
  hit.addEventListener("click", (e) => {
    if (state.phase === "over") { resetGame(); return; }
    const rect = hit.getBoundingClientRect();
    const lx = (e.clientX - rect.left) / rect.width * W;
    const ly = (e.clientY - rect.top) / rect.height * H;
    cleanPoopAt(lx, ly);
  });
  document.getElementById("overlay").addEventListener("click", () => resetGame());
}

/* =====================================================================
   CANVAS SETUP + HELPERS  (LCD is a true 300 x 250 -> 1 art px = 1 screen px)
===================================================================== */
const bgCanvas = document.getElementById("bg");
const fxCanvas = document.getElementById("fx");
const bg = bgCanvas.getContext("2d");
const fx = fxCanvas.getContext("2d");
bg.imageSmoothingEnabled = false;
fx.imageSmoothingEnabled = false;
const petImg = document.getElementById("pet");
const W = bgCanvas.width, H = bgCanvas.height;
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

function px(c, x, y, w, h, color) { c.fillStyle = color; c.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h)); }
function drawSprite(c, map, x, y, scale, colors) {
  x = Math.round(x); y = Math.round(y);
  for (let r = 0; r < map.length; r++)
    for (let col = 0; col < map[r].length; col++) {
      const p = colors[map[r][col]];
      if (p) px(c, x + col * scale, y + r * scale, scale, scale, p);
    }
}

/* Draw an asset centered at cx,cy, fit within maxW x maxH (aspect kept).
   Used for icons, poop and effect PNGs. Falls back to a pixel sprite. */
function drawAssetFit(c, key, cx, cy, maxW, maxH) {
  if (imageReady(key)) {
    const img = IMAGES[key];
    const s = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight);
    const w = img.naturalWidth * s, h = img.naturalHeight * s;
    c.drawImage(img, Math.round(cx - w / 2), Math.round(cy - h / 2), Math.round(w), Math.round(h));
    return;
  }
  const fb = FALLBACK[key];
  if (fb) {
    const s = Math.max(1, Math.floor(Math.min(maxW / sw(fb), maxH / sh(fb))));
    drawSprite(c, fb, cx - sw(fb) * s / 2, cy - sh(fb) * s / 2, s, SPR_COLORS);
  }
}

/* =====================================================================
   UPDATE
===================================================================== */
function update(dt) {
  if (state.phase !== "play") return;

  const poopDrain = state.poops.length * CONFIG.poopHappinessDrainPerSec;
  state.hunger    = Math.max(0, state.hunger    - CONFIG.decayPerSec.hunger * dt);
  state.happiness = Math.max(0, state.happiness - (CONFIG.decayPerSec.happiness + poopDrain) * dt);
  if (!state.sleeping) state.energy = Math.max(0, state.energy - CONFIG.decayPerSec.energy * dt);

  if (state.sleeping) {
    const now = performance.now();
    const p = Math.min(1, (now - state.sleepStart) / CONFIG.sleepDurationMs);
    state.energy = state.sleepFromEnergy + (CONFIG.maxStat - state.sleepFromEnergy) * p;
    if (Math.random() < dt * 2.2) state.effects.push({ type:"z", x:186, y:78, vy:34, life:1.6, max:1.6 });
    if (now >= state.sleepEnd) { state.sleeping = false; state.energy = CONFIG.maxStat; state.count.sleep++; }
  }

  if (state.stage !== "egg" && !state.sleeping) {
    state.poopTimer += dt;
    if (state.poopTimer >= CONFIG.poopEverySec) {
      state.poopTimer = 0;
      if (state.poops.length < CONFIG.maxPoops)
        state.poops.push({ id: state.poopId++, x: 60 + Math.random() * 170, y: 182 + Math.random() * 12 });
    }
  }

  tryEvolve();
  if (state.evolveTimer > 0) {
    state.evolveTimer -= dt;
    state.sparkleAcc += dt * 40;
    while (state.sparkleAcc >= 1) {
      state.sparkleAcc -= 1;
      const vy = 90 + Math.random() * 90;
      state.effects.push({ type:"sparkle", x: Math.random() * W, y: -8, vy, life: 99, max: 99 });
    }
  }
  if (state.flash > 0) state.flash = Math.max(0, state.flash - dt * 4);

  for (const e of state.effects) {
    if (e.type !== "sparkle") e.life -= dt;
    if (e.type === "heart" || e.type === "z") e.y -= e.vy * dt;
    else if (e.type === "food") e.y += e.vy * dt;
    else if (e.type === "sparkle") e.y += e.vy * dt;
  }
  state.effects = state.effects.filter((e) => e.type === "sparkle" ? e.y < H + 10 : e.life > 0);

  if (state.hop > 0) state.hop = Math.max(0, state.hop - dt * 3.5);
  state.blink = (state.blink + dt) % 1;

  if (state.hunger <= 0) endGame("died");
  else if (state.happiness <= 0) endGame("runaway");
}

/* =====================================================================
   RENDER
===================================================================== */
function drawStat(zoneX, iconKey, value) {
  drawAssetFit(bg, iconKey, zoneX + 22, 18, 26, 26);
  const barX = zoneX + 40, barY = 11, barW = 52, barH = 14;
  px(bg, barX, barY, barW, barH, COL.ink);
  px(bg, barX + 2, barY + 2, barW - 4, barH - 4, COL.lite);
  const fill = Math.round(((barW - 4) * value) / CONFIG.maxStat);
  if (fill > 0) px(bg, barX + 2, barY + 2, fill, barH - 4, COL.ink);
}

function drawMenu() {
  const centers = [60, 150, 240];
  const keys = [state.feedIcon, "heart", "star"];
  for (let i = 0; i < 3; i++) {
    const cx = centers[i], cy = 218, box = 44;
    const dim = state.sleeping && i !== 2;
    if (dim) bg.globalAlpha = 0.38;
    drawAssetFit(bg, keys[i], cx, cy, box, box);
    bg.globalAlpha = 1;
    if (!state.sleeping && i === state.cursor && state.blink < 0.6) {
      const half = box / 2 + 4;
      const bx = cx - half, by = cy - half, bw = half * 2, bh = half * 2;
      px(bg, bx, by, bw, 2, COL.ink);
      px(bg, bx, by + bh - 2, bw, 2, COL.ink);
      px(bg, bx, by, 2, bh, COL.ink);
      px(bg, bx + bw - 2, by, 2, bh, COL.ink);
    }
  }
}

function drawPoops() {
  const s = CONFIG.poopRenderPx;
  for (const p of state.poops) drawAssetFit(bg, "poo", p.x, p.y, s, s);
}

function drawBlob(oy) {
  const scale = 6, w = sw(SPR.blob) * scale, h = sh(SPR.blob) * scale;
  drawSprite(bg, SPR.blob, 150 - w / 2, 112 + oy - h / 2, scale, SPR_COLORS);
}

function drawEffects() {
  for (const e of state.effects) {
    if (e.type === "sparkle")   { drawSprite(fx, SPR.sparkle, e.x - 4, e.y - 4, 3, { "#":COL.ink }); }
    else if (e.type === "z")    { drawSprite(fx, SPR.zGlyph, e.x - 7, e.y - 7, 3, { "#":COL.ink }); }
    else if (e.type === "heart"){ drawAssetFit(fx, "heart", e.x, e.y, 22, 22); }
    else if (e.type === "food") { drawAssetFit(fx, e.key, e.x, e.y, 28, 28); }
  }
}

/* Pet is a real <img> so egg-animated.png actually animates. Creatures
   render at native size (no resize). */
function updatePet(t) {
  const key = petAssetKey();
  const ready = imageReady(key);
  const scale = (bgCanvas.clientWidth || W) / W; // ~1 -> native size on screen
  const bob = reduceMotion ? 0 : Math.sin(t / 520) * 4;
  const hop = -Math.sin(state.hop * Math.PI) * 16;
  const oy = bob + hop;

  if (ready) {
    state.petBlob = false;
    if (state.petKey !== key) {
      petImg.src = IMAGES[key].src;
      petImg.style.display = "block";
      state.petKey = key;
    }
    petImg.style.width = (IMAGES[key].naturalWidth * scale) + "px";
    petImg.style.height = (IMAGES[key].naturalHeight * scale) + "px";
    petImg.style.transform = `translate(-50%, calc(-50% + ${oy * scale}px))`;
  } else {
    state.petBlob = true;
    state.petKey = null;
    petImg.style.display = "none";
  }
  return oy;
}

function render(t) {
  const oy = updatePet(t);

  px(bg, 0, 0, W, H, COL.bg);
  drawStat(0,   "icecream", state.hunger);
  drawStat(100, "bowling",  state.energy);
  drawStat(200, "heart",    state.happiness);
  drawPoops();
  if (state.petBlob) drawBlob(oy);
  drawMenu();

  fx.clearRect(0, 0, W, H);
  drawEffects();
  if (state.flash > 0) { fx.globalAlpha = state.flash * 0.8; px(fx, 0, 0, W, H, "#f4f3ea"); fx.globalAlpha = 1; }
}

/* =====================================================================
   LOOP + INIT
===================================================================== */
let last = 0;
function loop(now) {
  let dt = (now - last) / 1000; last = now;
  if (dt > 0.1) dt = 0.1;
  update(dt);
  render(now);
  requestAnimationFrame(loop);
}
function init() {
  loadImages();
  resetGame();
  wireInput();
  last = performance.now();
  requestAnimationFrame(loop);
}
init();
</script>
